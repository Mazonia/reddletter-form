<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Letter Gate — CTF Registration</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-overlay"></div>
  <div class="scanlines"></div>
  <canvas id="matrix-canvas"></canvas>

  <main class="container">

    <header class="site-header">
      <div class="orgs">
        <img src="ssshhadesctf.jpeg" alt="ssshadesCTF" class="org-logo" />
        <span class="x-sep">&times;</span>
        <img src="geekbyte_logo_white_no_bg.png" alt="Geek Byte" class="org-logo" />
      </div>
      <p class="presents">P R E S E N T S</p>

      <h1 class="title">
        <span class="red">RED</span><span class="white">LETTER</span><br />
        <span class="gate">GATE</span>
      </h1>

      <p class="subtitle">— An Eid-ul-Adha CTF Challenge —</p>

      <div class="tags">
        <span class="tag"><span class="tag-icon">🛡</span> Intermediate</span>
        <span class="tag"><span class="tag-icon">💻</span> Boot2Root</span>
        <span class="tag"><span class="tag-icon">🗄</span> NoSQL</span>
      </div>

      <div class="dates">
        <div class="date-block">
          <span class="date-label">Registration Ends</span>
          <span class="date-val">25th May</span>
        </div>
        <div class="date-sep">▶</div>
        <div class="date-block">
          <span class="date-label">Challenge Goes Live</span>
          <span class="date-val">29th May</span>
        </div>
      </div>

      <p class="reward">🏆 First Blood Reward</p>
    </header>

    <section class="form-section">
      <h2 class="form-title">Register Now</h2>

      <form id="reg-form"
            action="https://docs.google.com/forms/d/e/1FAIpQLSc94NJTrouUWO3TMEptfrqIodtu8ptCb4_eW6a7JwJ_G0lIow/formResponse"
            method="POST"
            target="hidden-iframe"
            novalidate>

        <div class="field-row">
          <div class="field">
            <label for="full-name">Full Name <span class="req">*</span></label>
            <input type="text" id="full-name" name="entry.134581250" placeholder="Your full name" required />
          </div>
          <div class="field">
            <label for="hacker-name">Username / Hacker Name <span class="req">*</span></label>
            <input type="text" id="hacker-name" name="entry.802131618" placeholder="Your CTF handle" required />
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="email">Email Address <span class="req">*</span></label>
            <input type="email" id="email" name="entry.917787244" placeholder="you@example.com" required />
          </div>
          <div class="field">
            <label for="whatsapp">WhatsApp Number <span class="req">*</span></label>
            <input type="tel" id="whatsapp" name="entry.2030506870" placeholder="+1 234 567 8900" required />
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="discord">Discord Profile</label>
            <input type="text" id="discord" name="entry.1527573884" placeholder="@username or username#0000" />
          </div>
          <div class="field">
            <label for="experience">CTF Experience <span class="req">*</span></label>
            <select id="experience" name="entry.1190728481" required>
              <option value="" disabled selected>Select your level</option>
              <option value="Beginner (0 - 1 year)">Beginner (0–1 yr)</option>
              <option value="Intermediate (1 - 3 year)">Intermediate (1–3 yrs)</option>
              <option value="Advanced/Experienced (3+ years)">Advanced (3+ yrs)</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Are you a student? <span class="req">*</span></label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="entry.1364474925" value="Yes" required />
              <span>Yes</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="entry.1364474925" value="No" required />
              <span>No</span>
            </label>
          </div>
        </div>

        <div class="field checkbox-field">
          <label class="checkbox-label">
            <input type="checkbox" id="agree" name="agree" required />
            <span>I agree to participate fairly and abide by the competition rules <span class="req">*</span></span>
          </label>
        </div>

        <button type="submit" class="submit-btn">
          <span class="btn-text">REGISTER FOR THE CHALLENGE</span>
          <span class="btn-glow"></span>
        </button>

        <div id="form-msg" class="form-msg hidden"></div>
      </form>
    </section>

    <footer class="site-footer">
      <p class="socials-label">Our Socials</p>
      <div class="socials">
        <a href="https://linkedin.com/company/geek-byte" target="_blank" class="social-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          Geek Byte
        </a>
        <a href="https://twitter.com/ssshadesCTF_" target="_blank" class="social-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.259 5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          ssshadesCTF_
        </a>
      </div>
      <p class="footer-note">Red Letter Gate &copy; 2025 — ssshadesCTF &times; Geek Byte</p>
    </footer>

  </main>

  <!-- Google Forms submits here silently — keeps user on the page -->
  <iframe name="hidden-iframe" style="display:none"></iframe>

  <script src="script.js"></script>
</body>
</html>
